<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELIM JANG</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        /* 화면 전체를 사용하고 중앙 정렬하기 위한 설정 */
        body { 
            font-family: 'Pretendard', sans-serif;
            margin: 0; 
            padding: 0;
            height: 100vh; /* 화면 전체 높이 */
            display: flex; 
            justify-content: center; /* 가로 중앙 정렬 */
            align-items: center; /* 세로 중앙 정렬 */
            background-color: #fafafa; /* 아주 연한 회색 배경으로 세련된 느낌 */
            color: #111; 
        }

        /* 이름과 버튼들을 묶어주는 투명한 상자 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* 안의 내용물들을 오른쪽으로 정렬 */
        }

        /* 이름 스타일 */
        h1 { 
            font-size: 6rem; /* 글씨를 아주 크게 */
            font-weight: 800;
            margin: 0 0 1.5rem 0; /* 아래쪽 여백 */
            letter-spacing: -0.05em; /* 자간을 살짝 좁혀서 단단한 느낌 */
            line-height: 1;
        }

        /* 버튼 영역 스타일 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem; /* 버튼 사이의 간격 */
        }

        /* 각 줄(CV, PF)의 스타일 */
        .row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 1rem; /* 글씨와 버튼 사이의 간격 */
            font-size: 1.5rem;
            font-weight: 600;
            color: #444;
        }

        /* 클릭하는 버튼(Download) 스타일 */
        .btn { 
            display: inline-block; 
            padding: 0.6rem 1.5rem; 
            background-color: #111; 
            color: white; 
            text-decoration: none; 
            border-radius: 30px; /* 둥근 버튼 형태 */
            font-size: 1.1rem; 
            font-weight: 500; 
            transition: background-color 0.2s ease;
        }

        .btn:hover { 
            background-color: #555; /* 마우스를 올렸을 때 색상 변화 */
        }

        /* 모바일 화면(화면이 좁을 때)을 위한 설정 */
        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            .row { font-size: 1.2rem; }
            .btn { font-size: 1rem; padding: 0.5rem 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SELIM JANG</h1>
        
        <div class="button-group">
            <div class="row">
                <span>SelimJang_CV &rarr;</span>
                <a href="CV.pdf" class="btn" download>Download</a>
            </div>
            <div class="row">
                <span>PF &rarr;</span>
                <a href="SelimJang_PF.pdf" class="btn" download>Download</a>
            </div>
        </div>
    </div>

</body>
</html>
