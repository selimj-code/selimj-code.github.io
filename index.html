<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELIM JANG</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        body { 
            font-family: 'Pretendard', sans-serif;
            margin: 0; 
            padding: 0;
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #111; 
            color: #ececec; 
            overflow: hidden; 
            position: relative; 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
            transform: translateY(-4rem); 
            transition: transform 0.3s ease; 
        }

        h1 { 
            font-size: 6rem; 
            font-weight: 800;
            margin: 0 0 1.5rem 0; 
            letter-spacing: -0.05em; 
            line-height: 1;
            cursor: default; 
        }

        h1 span.letter {
            display: inline-block; 
            transition: all 0.2s ease;
            color: #ececec; 
        }

        h1 span.letter:hover {
            color: #ffffff; 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); 
            transform: translateY(-5px); 
        }

        .space {
            display: inline-block;
            width: 0rem; 
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem; 
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 1rem; 
            font-size: 1.5rem;
            font-weight: 600;
            color: #aaa; 
        }

        .label-box {
            display: flex;
            justify-content: space-between; 
            width: 4.0rem; 
        }

        .btn { 
            display: inline-block; 
            padding: 0.6rem 1.5rem; 
            background-color: #ececec; 
            color: #111; 
            text-decoration: none; 
            border-radius: 30px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            transition: all 0.2s ease;
        }

        .btn:hover { 
            background-color: #fff; 
            transform: translateY(-2px); 
        }

        /* ---------------------------------------------------
           잔상 효과 레이아웃 수정
        --------------------------------------------------- */
        .cat-highway {
            position: fixed; 
            bottom: 2rem; 
            left: 0;
            width: 100%;
            height: 12rem; /* 높이를 넉넉히 주어 잘림 방지 */
            pointer-events: none; 
            font-size: 2rem;
            line-height: 1.2; 
            white-space: pre; 
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        /* 전체 그룹이 오른쪽으로 이동 */
        .cat-ghost-group {
            position: absolute;
            animation: driveRight 12s linear infinite; /* 속도를 살짝 올렸습니다 */
            width: 15rem; /* 고양이 폭만큼 확보 */
            height: 100%;
        }

        /* 모든 고양이(원본+잔상)를 한 자리에 겹침 */
        .cat-original, .cat-ghost1, .cat-ghost2 {
            position: absolute; 
            top: 0;
            left: 0;
            word-spacing: -1px;
        }

        /* 원본 고양이 */
        .cat-original {
            color: #aaa;
            z-index: 3;
        }

        /* 잔상 1: 살짝 뒤에 배치 */
        .cat-ghost1 {
            color: rgba(170, 170, 170, 0.3);
            transform: translateX(-7px); /* 뒤로 15px 밀림 */
            z-index: 2;
        }

        /* 잔상 2: 더 뒤에 배치 */
        .cat-ghost2 {
            color: rgba(170, 170, 170, 0.1);
            transform: translateX(-14px); /* 뒤로 30px 밀림 */
            z-index: 1;
        }

        @keyframes driveRight {
            0% { transform: translateX(-20rem); }
            100% { transform: translateX(100vw); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            .row { font-size: 1.2rem; }
            .btn { font-size: 1rem; padding: 0.5rem 1.2rem; }
            .label-box { width: 3.8rem; } 
            .space { width: 1rem; }
            .container { transform: translateY(-2rem); } 
            .cat-highway { font-size: 1.2rem; bottom: 1rem; height: 6rem; } 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            <span class="letter">S</span><span class="letter">E</span><span class="letter">L</span><span class="letter">I</span><span class="letter">M</span>
            <span class="space"></span> 
            <span class="letter">J</span><span class="letter">A</span><span class="letter">N</span><span class="letter">G</span>
        </h1>
        
        <div class="button-group">
            <div class="row">
                <div class="label-box">
                    <span>CV</span>
                    <span>&rarr;</span>
                </div>
                <a href="SelimJang_CV.pdf" class="btn" download>Download</a>
            </div>
            <div class="row">
                <div class="label-box">
                    <span>PF</span>
                    <span>&rarr;</span>
                </div>
                <a href="SelimJang_PF.pdf" class="btn" download>Download</a>
            </div>
        </div>
    </div>

    <div class="cat-highway">
        <div class="cat-ghost-group">
            <div class="cat-ghost2"> /∧_/∧
 (•ω•)
 ( つ┳⊃
  ◎し◎</div>
            <div class="cat-ghost1"> /∧_/∧
 (•ω•)
 ( つ┳⊃
  ◎し◎</div>
            <div class="cat-original"> /∧_/∧
 (•ω•)
 ( つ┳⊃
  ◎し◎</div>
        </div>
    </div>

</body>
</html>
