<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELIM JANG</title>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        body { 
            font-family: 'Pretendard', sans-serif;
            margin: 0; 
            padding: 0;
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #111; 
            color: #ececec; 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
        }

        h1 { 
            font-size: 6rem; 
            font-weight: 800;
            margin: 0 0 1.5rem 0; 
            letter-spacing: -0.05em; 
            line-height: 1;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem; 
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 1rem; 
            font-size: 1.5rem;
            font-weight: 600;
            color: #aaa; 
        }

        /* [수정된 부분] 글씨와 화살표를 담는 고정 너비의 상자 */
        .label-box {
            display: flex;
            justify-content: space-between; /* 양끝으로 밀어내기 */
            width: 4.0rem; /* 이 너비를 기준으로 완벽하게 정렬됩니다 */
        }

        .btn { 
            display: inline-block; 
            padding: 0.6rem 1.5rem; 
            background-color: #ececec; 
            color: #111; 
            text-decoration: none; 
            border-radius: 30px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            transition: all 0.2s ease;
        }

        .btn:hover { 
            background-color: #fff; 
            transform: translateY(-2px); 
        }

        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            .row { font-size: 1.2rem; }
            .btn { font-size: 1rem; padding: 0.5rem 1.2rem; }
            .label-box { width: 3.8rem; } /* 모바일에서는 너비를 살짝 줄임 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SELIM JANG</h1>
        
        <div class="button-group">
            <div class="row">
                <div class="label-box">
                    <span>CV</span>
                    <span>&rarr;</span>
                </div>
                <a href="SelimJang_CV.pdf" class="btn" download>Download</a>
            </div>
            <div class="row">
                <div class="label-box">
                    <span>PF</span>
                    <span>&rarr;</span>
                </div>
                <a href="SelimJang_PF.pdf" class="btn" download>Download</a>
            </div>
        </div>
    </div>

</body>
</html>
